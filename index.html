<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1A3 Class Server</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"><svg viewBox="0 0 100 100" fill="none"><path d="M10 10 L10 50 M10 10 L50 10" stroke="#c9a96e" stroke-width="1"/><circle cx="10" cy="10" r="2" fill="#c9a96e"/></svg></div>
  <div class="corner corner-tr"><svg viewBox="0 0 100 100" fill="none"><path d="M10 10 L10 50 M10 10 L50 10" stroke="#c9a96e" stroke-width="1"/><circle cx="10" cy="10" r="2" fill="#c9a96e"/></svg></div>
  <div class="corner corner-bl"><svg viewBox="0 0 100 100" fill="none"><path d="M10 10 L10 50 M10 10 L50 10" stroke="#c9a96e" stroke-width="1"/><circle cx="10" cy="10" r="2" fill="#c9a96e"/></svg></div>
  <div class="corner corner-br"><svg viewBox="0 0 100 100" fill="none"><path d="M10 10 L10 50 M10 10 L50 10" stroke="#c9a96e" stroke-width="1"/><circle cx="10" cy="10" r="2" fill="#c9a96e"/></svg></div>

  <div class="toast" id="toast"></div>

  <!-- ═══ PAGES ═══ -->
  <!-- Each page is in its own file for clarity -->
  <div id="pages-container">
    <!-- Pages are injected here by pages/loader.js, OR you can paste them directly -->
  </div>

  <!-- Include page HTML directly (alternative to loader) -->
  <!-- Uncomment the approach you prefer: -->

  <!-- OPTION A: All pages inline (simplest, no server needed) -->
  <!-- Just paste the page divs from pages/*.html directly here -->

  <!-- OPTION B: Use a simple loader (requires a local server) -->
  <!-- <script src="js/page-loader.js"></script> -->

  <!-- ═══ SCRIPTS (load order matters) ═══ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 1. Config & Supabase client first -->
  <script src="js/config.js"></script>

  <!-- 2. Core utilities -->
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>

  <!-- 3. Auth & user management -->
  <script src="js/auth.js"></script>
  <script src="js/namepicker.js"></script>

  <!-- 4. Page logic -->
  <script src="js/dashboard.js"></script>
  <script src="js/timetable.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/homework.js"></script>
  <script src="js/events.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/owner.js"></script>

  <!-- 5. Games -->
  <script src="js/games/lock.js"></script>
  <script src="js/games/chess-solo.js"></script>
  <script src="js/games/chess-multi.js"></script>
  <script src="js/games/snake.js"></script>
  <script src="js/games/tetris.js"></script>
  <script src="js/games/2048.js"></script>
  <script src="js/games/minesweeper.js"></script>
  <script src="js/games/fishing.js"></script>
  <script src="js/games/tower-defence.js"></script>
  <script src="js/games/wordle.js"></script>
  <script src="js/games/cat.js"></script>
  <script src="js/games/chameleon.js"></script>

  <!-- 6. App entry point — runs last -->
  <script src="js/app.js"></script>
</body>
</html>
